<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imFish Book 设置</title>
  <style>
    :root {
      --bg-page: var(--vscode-editor-background);
      --bg-card: var(--vscode-sideBar-background, var(--vscode-editorWidget-background));
      --bg-muted: var(--vscode-input-background);
      --text-primary: var(--vscode-foreground);
      --text-secondary: var(--vscode-descriptionForeground);
      --border: var(--vscode-panel-border, var(--vscode-widget-border, rgba(128, 128, 128, 0.35)));
      --primary: var(--vscode-button-background);
      --primary-fg: var(--vscode-button-foreground);
      --primary-hover: var(--vscode-button-hoverBackground);
      --focus: var(--vscode-focusBorder);
      --progress: var(--vscode-progressBar-background, var(--vscode-button-background));
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
      font-size: var(--vscode-font-size, 13px);
      padding: 16px;
      margin: 0;
      color: var(--text-primary);
      line-height: 1.45;
      background: var(--bg-page);
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .page-header {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 2px 2px 6px;
    }

    .page-header-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text-primary);
    }

    .page-header-sub {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 12px;
      color: var(--text-primary);
    }

    .folder-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .folder-path {
      flex: 1;
      min-width: 0;
      font-family: var(--vscode-editor-font-family, ui-monospace, monospace);
      font-size: 12px;
      color: var(--text-secondary);
      padding: 7px 10px;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      word-break: break-all;
    }

    .folder-row .btn-primary {
      flex-shrink: 0;
    }

    .info-box {
      background: color-mix(in srgb, var(--bg-muted) 85%, transparent);
      border-left: 3px solid var(--primary);
      padding: 8px 12px;
      margin: 0 0 12px;
      border-radius: 0 6px 6px 0;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .file-list {
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 420px;
      overflow-y: auto;
      background: var(--bg-page);
      scrollbar-width: thin;
      scrollbar-color: var(--text-secondary) transparent;
    }

    .file-list::-webkit-scrollbar {
      width: 6px;
    }

    .file-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .file-list::-webkit-scrollbar-thumb {
      background-color: var(--text-secondary);
      border-radius: 3px;
    }

    .file-item {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .file-item:hover {
      background: color-mix(in srgb, var(--bg-muted) 70%, transparent);
    }

    .file-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .file-name {
      font-weight: 600;
      font-size: 13px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .file-status {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .file-status.is-unread {
      opacity: 0.75;
    }

    .progress-row {
      display: block;
    }

    .progress-bar {
      height: 4px;
      background: color-mix(in srgb, var(--border) 80%, transparent);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: var(--progress);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .progress-set {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .progress-set-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .progress-editor {
      display: inline-flex;
      align-items: stretch;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-muted);
      overflow: hidden;
      flex-shrink: 0;
    }

    .progress-editor:focus-within {
      border-color: var(--focus);
      box-shadow: 0 0 0 1px var(--focus);
    }

    .progress-input {
      width: 40px;
      margin: 0;
      padding: 0 2px 0 8px;
      border: none !important;
      border-radius: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      text-align: right;
      outline: none;
      max-width: none !important;
      -moz-appearance: textfield;
    }

    .progress-input::-webkit-outer-spin-button,
    .progress-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .progress-suffix {
      display: inline-flex;
      align-items: center;
      padding-right: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      user-select: none;
    }

    .btn-apply {
      padding: 0 10px;
      border: none;
      border-left: 1px solid var(--border);
      border-radius: 0;
      background: transparent;
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-apply:hover {
      background: color-mix(in srgb, var(--primary) 14%, transparent);
    }

    button {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--primary-fg);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-small {
      padding: 0 12px;
      min-height: 28px;
      font-size: 12px;
      border-radius: 6px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text-primary);
      background: var(--bg-muted);
      border-color: color-mix(in srgb, var(--border) 60%, var(--text-secondary));
    }

    .file-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .empty-list {
      padding: 52px 16px;
      text-align: center;
    }

    .empty-message {
      color: var(--text-secondary);
      font-size: 13px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-group {
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group-wide {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }

    input[type="number"],
    input[type="color"] {
      width: 100%;
      max-width: 140px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      background: var(--bg-muted);
      color: var(--text-primary);
      outline: none;
    }

    input[type="number"]:focus,
    input[type="color"]:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 1px var(--focus);
    }

    .color-picker {
      width: 100%;
      max-width: 140px;
      height: 32px;
      padding: 2px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-muted);
      cursor: pointer;
    }

    .color-picker::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .color-picker::-webkit-color-swatch {
      border: none;
      border-radius: 4px;
    }

    .settings-grid input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 6px 0 0;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .card-actions {
      margin-top: 2px;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .folder-row {
        flex-direction: column;
        align-items: stretch;
      }

      .settings-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      input[type="number"],
      input[type="color"],
      .color-picker {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="page-header-title">imFish Book</div>
      <div class="page-header-sub">设置</div>
    </header>

    <section class="card">
      <h2 class="card-title">书籍管理</h2>
      <div class="folder-row">
        <div id="folder-path" class="folder-path">未设置书籍目录</div>
        <button id="select-directory" class="btn-primary">选择目录</button>
      </div>
      <div class="info-box">
        提示：开始阅读 epub 后，会在同目录生成同名 txt，实际阅读的是 txt。
      </div>
      <div id="file-list" class="file-list"></div>
    </section>

    <section class="card">
      <h2 class="card-title">阅读设置</h2>
      <div class="settings-grid">
        <div class="form-group form-group-wide">
          <label for="max-chars-per-page">每次翻页显示多少字</label>
          <input type="number" id="max-chars-per-page" min="1" value="50">
        </div>
        <div class="form-group">
          <label for="font-size">字体大小</label>
          <input type="number" id="font-size" min="8" max="72" step="1">
        </div>
        <div class="form-group">
          <label for="font-color">字体颜色</label>
          <input type="color" id="font-color" class="color-picker">
        </div>
        <div class="form-group">
          <label for="auto-wrap">自动换行</label>
          <input type="checkbox" id="auto-wrap" checked>
        </div>
      </div>
      <div class="info-box">
        数字越大，每次翻页看到的文字越多。开启「自动换行」后，长句会按窗口宽度自动折到下一行。
      </div>
      <div class="card-actions">
        <button id="save-settings" class="btn-primary">保存设置</button>
      </div>
    </section>
  </div>

  <script>
    const vscode = acquireVsCodeApi();

    window.addEventListener('message', event => {
      const message = event.data;
      switch (message.command) {
        case 'updateFileList':
          updateFileList(message);
          break;
        case 'updateSettings':
          updateSettings(message.settings);
          break;
      }
    });

    function updateFileList(message) {
      document.getElementById('folder-path').textContent = message.currentFolder;

      const fileList = document.getElementById('file-list');

      if (!message.files || message.files.length === 0) {
        fileList.innerHTML = `
          <div class="empty-list">
            <div class="empty-message">当前目录下未发现txt，epub书籍</div>
          </div>
        `;
        return;
      }

      fileList.innerHTML = message.files.map(file => {
        const progress = file.progress || {};
        const hasProgress = typeof progress.currentLine === 'number';
        const progressPercent = hasProgress
          ? Math.min(100, Math.round((progress.currentLine / Math.max(1, (progress.totalLines || 1) - 1)) * 100))
          : 0;
        const filtPath = JSON.stringify(file.path).replace(/\"/g,"'");
        const inputId = 'progress-' + encodeURIComponent(file.path).replace(/%/g, '_');
        const barId = inputId + '-bar';
        const statusText = hasProgress ? `已读 ${progressPercent}%` : '未开始';
        const statusClass = hasProgress ? '' : 'is-unread';

        return `
          <div class="file-item">
            <div class="file-info">
              <div class="file-header">
                <div class="file-name" title="${file.name.replace(/"/g, '&quot;')}">${file.name}</div>
                <div class="file-status ${statusClass}">${statusText}</div>
              </div>
              <div class="progress-row">
                <div class="progress-bar" aria-hidden="true">
                  <div id="${barId}" class="progress-fill" style="width: ${progressPercent}%"></div>
                </div>
              </div>
              <div class="file-actions">
                ${hasProgress
                  ? `<button class="btn-primary btn-small" onclick="continueReading(${filtPath}, ${progress.currentLine}, ${progress.charOffset || 0})">继续阅读</button>`
                  : `<button class="btn-primary btn-small" onclick="startReading(${filtPath})">开始阅读</button>`
                }
                ${hasProgress
                  ? `<button class="btn-ghost btn-small" onclick="startReading(${filtPath})">重新开始</button>`
                  : ''
                }
                <div class="progress-set">
                  <span class="progress-set-label">设置当前进度为：</span>
                  <div class="progress-editor">
                    <input
                      id="${inputId}"
                      class="progress-input"
                      type="number"
                      min="0"
                      max="100"
                      value="${progressPercent}"
                      aria-label="阅读进度百分比"
                      oninput="previewProgress('${barId}', this.value)"
                    />
                    <span class="progress-suffix">%</span>
                    <button type="button" class="btn-apply" onclick="applyProgress(${filtPath}, '${inputId}')">应用</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateSettings(settings) {
      document.getElementById('font-size').value = settings.fontSize || 14;
      document.getElementById('font-color').value = settings.fontColor || '#A8A8A8';
      document.getElementById('auto-wrap').checked = settings.autoWrap !== false;
      document.getElementById('max-chars-per-page').value = settings.maxCharsPerPage || 50;
    }

    document.getElementById('select-directory').addEventListener('click', () => {
      vscode.postMessage({ command: 'selectDirectory' });
    });

    document.getElementById('save-settings').addEventListener('click', () => {
      const fontSize = document.getElementById('font-size').value;
      const fontColor = document.getElementById('font-color').value;
      const autoWrap = document.getElementById('auto-wrap').checked;
      const maxCharsPerPage = document.getElementById('max-chars-per-page').value;

      vscode.postMessage({
        command: 'saveSettings',
        fontSize: parseInt(fontSize),
        fontColor: fontColor,
        autoWrap: autoWrap,
        maxCharsPerPage: parseInt(maxCharsPerPage) || 50,
        maxCharsPerLine: 0,
        linesPerPage: 200
      });
    });

    function continueReading(filePath, line, charOffset) {
      vscode.postMessage({
        command: 'selectFile',
        file: filePath,
        startLine: line,
        charOffset: charOffset || 0
      });
    }

    function previewProgress(barId, value) {
      const bar = document.getElementById(barId);
      if (!bar) return;
      const percent = Math.max(0, Math.min(100, Number(value) || 0));
      bar.style.width = percent + '%';
    }

    function applyProgress(filePath, inputId) {
      const input = document.getElementById(inputId);
      const percent = input ? Number(input.value) : 0;
      vscode.postMessage({
        command: 'setProgress',
        file: filePath,
        percent: percent
      });
    }

    function startReading(filePath) {
      vscode.postMessage({
        command: 'selectFile',
        file: filePath,
        startLine: 0,
        charOffset: 0
      });
    }
  </script>
</body>
</html>
